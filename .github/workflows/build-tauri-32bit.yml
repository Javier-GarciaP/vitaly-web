name: Build Tauri 32-bit Installer

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'README.md'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  build-tauri:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-pc-windows-msvc

      - name: Build Tauri app (32-bit Windows)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VITE_WORKER_URL_COP: ${{ secrets.VITE_WORKER_URL_COP }}
          VITE_WORKER_URL_USD: ${{ secrets.VITE_WORKER_URL_USD }}
        with:
          args: --target i686-pc-windows-msvc

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Vitaly-Pro-32bit-Installer
          path: src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/*.exe
